version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: float_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1223
      POSTGRES_DB: float_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: float_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: